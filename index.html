<!DOCTYPE html><html lang="en"><head>
<meta charset="UTF-8"><title>📽️ Videos</title>
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<style>
:root{--btn-width:240px;--btn-height:120px;--primary:#1f6feb;--primary-dark:#1158c7;--bg:#121212;--text:#e0e0e0;--btn-spacing:.5em}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',sans-serif;background:var(--bg);color:var(--text);display:flex;flex-direction:column}
.main-wrapper{display:flex;flex-direction:column;align-items:center;gap:1em;width:100%;padding:0 1em;flex-grow:1}
.row,.random-buttons-container{display:flex;justify-content:center;flex-wrap:wrap;gap:var(--btn-spacing);width:100%}
button,select{background:linear-gradient(145deg,var(--primary),var(--primary-dark));color:#fff;font-size:1.2em;font-weight:500;border:none;border-radius:12px;cursor:pointer;width:var(--btn-width);height:var(--btn-height);max-width:90vw}
select{height:auto;min-height:3em;padding:.5em;font-size:1em;width:260px}
#container,h1,h2,h3,.video-link,.source-block,#backToTop{display:none!important}
.mini-filter-row{display:flex;gap:.5em;justify-content:center}
.mini-filter-row button{width:80px;height:40px;font-size:.8em;border-radius:8px}
@media(max-width:600px){button{font-size:.8em;width:80px;height:80px}select{width:280px}}
.source-buttons{display:grid;grid-template-columns:repeat(3,1fr);gap:var(--btn-spacing);width:100%}
.dropdown-wrapper{margin-top:auto;display:flex;flex-direction:column;gap:1em;margin-bottom:15em}
.toggle-row{display:flex;justify-content:center}
.toggle-row label{cursor:pointer}
</style></head><body>

<div class="main-wrapper">
<div class="random-buttons-container" id="random-buttons"></div>
<div class="source-buttons" id="source-buttons"></div>

<div class="dropdown-wrapper">

<div class="toggle-row">
<label><input type="checkbox" id="includeExcludedToggle"> Include all</label>
</div>

<div class="mini-filter-row">
<button id="clearFilterP">Clear</button><button id="filterAMP">A-M</button><button id="filterNZP">N-Z</button>
</div>
<div class="row"><select id="categorySelect"><option value="">Select a Performer</option></select></div>

<div class="mini-filter-row">
<button id="clearFilterC">Clear</button><button id="filterAMC">A-M</button><button id="filterNZC">N-Z</button>
</div>
<div class="row"><select id="channelSelect"><option value="">Select a Channel</option></select></div>

<div class="row">
<button id="playRandomCategoryBtn">🔀 Performer</button>
<button id="playRandomChannelBtn">🔀 Channel</button>
<button id="playSelectedBtn" disabled>▶️ Play from Selected (0)</button>
</div>
</div></div>

<div id="container"></div>

<script>
const PLAYER="dependencies/indian.html",MIN_VIDEOS=8;

let streamableLinks={},fullCategoryMap={},fullChannelMap={},filteredCategoryMap={},filteredChannelMap={};

// 🔹 STORAGE KEYS
const STORAGE_KEYS={
category:"selectedCategory",
channel:"selectedChannel",
includeExcluded:"includeExcluded"
};

// 🔹 DEFINE EXCLUDED CHANNELS HERE
const EXCLUDED_CHANNELS = new Set([
"lesbian"
]);

let includeExcluded = localStorage.getItem(STORAGE_KEYS.includeExcluded)==="true";

// 🔹 FILTER FUNCTION
function isAllowedVideo(v){
if(includeExcluded) return true;
let chans=(v.c||v.channel||[]).filter(Boolean);
return !chans.some(ch=>EXCLUDED_CHANNELS.has(ch));
}

fetch("dependencies/videos.json").then(r=>r.json()).then(d=>{streamableLinks=d;initApp()});

function initApp(){
const sDiv=document.getElementById("source-buttons"),
cSel=document.getElementById("categorySelect"),
chSel=document.getElementById("channelSelect"),
playBtn=document.getElementById("playSelectedBtn"),
toggle=document.getElementById("includeExcludedToggle");

toggle.checked=includeExcluded;
toggle.onchange=()=>{
includeExcluded=toggle.checked;
localStorage.setItem(STORAGE_KEYS.includeExcluded,includeExcluded);
location.reload();
};

const cMap={},chMap={},rnd=a=>a[Math.floor(Math.random()*a.length)],alpha=(a,b)=>a.localeCompare(b,undefined,{sensitivity:"base"});

const openVideo=k=>k.startsWith("id:")?window.open(`${PLAYER}?q=${k.slice(3)}`,"_blank"):window.open(k,"_blank","noopener noreferrer");

Object.entries(streamableLinks).forEach(([src,videos])=>{

sDiv.appendChild(Object.assign(document.createElement("button"),{
textContent:`🔀 ${src} (${videos.length})`,
onclick:()=>{
let keys=videos
.filter(v=>isAllowedVideo(v))
.map(v=>v.u?.trim()?v.u:v.id?`id:${v.id}`:0)
.filter(Boolean);
if(keys.length)openVideo(rnd(keys));
}
}));

videos.forEach(v=>{
if(!isAllowedVideo(v)) return;

let k=v.u?.trim()?v.u:v.id?`id:${v.id}`:0;if(!k)return;

(v.p||v.performers||[]).filter(x=>x&&x.trim()).forEach(p=>(cMap[p]??=[]).push(k));
(v.c||v.channel||[]).filter(x=>x&&x.trim()).forEach(c=>(chMap[c]??=[]).push(k));
});
});

const minFilter=m=>Object.fromEntries(Object.entries(m).filter(([,a])=>a.length>=MIN_VIDEOS));
fullCategoryMap=minFilter(cMap);fullChannelMap=minFilter(chMap);
filteredCategoryMap={...fullCategoryMap};filteredChannelMap={...fullChannelMap};

const alphaFilter=(m,t)=>t==="ALL"?{...m}:Object.fromEntries(Object.entries(m).filter(([k])=>{
let f=k[0].toUpperCase();return t==="AM"?f>="A"&&f<="M":f>="N"&&f<="Z"}));

const populate=(el,m,ph,val=null)=>{
el.innerHTML=`<option value="">${ph}</option>`;
Object.keys(m).sort(alpha).forEach(k=>{
let o=document.createElement("option");o.value=k;o.textContent=`${k} (${m[k].length})`;if(k===val)o.selected=1;el.appendChild(o);
});
};

const update=()=>{
let p=cSel.value,c=chSel.value;
if(p&&c){
let v=filteredCategoryMap[p].filter(k=>filteredChannelMap[c].includes(k));
playBtn.textContent=`▶️ Play from Selected (${v.length})`;playBtn.disabled=!v.length;
}else{playBtn.textContent="▶️ Play from Selected (0)";playBtn.disabled=1}
};

// 🔹 RESTORE SAVED VALUES
const savedCategory=localStorage.getItem(STORAGE_KEYS.category);
const savedChannel=localStorage.getItem(STORAGE_KEYS.channel);

populate(cSel,filteredCategoryMap,"Select a Performer",savedCategory);
populate(chSel,filteredChannelMap,"Select a Channel",savedChannel);

update();

cSel.onchange=()=>{
let p=cSel.value;
localStorage.setItem(STORAGE_KEYS.category,p||"");
if(!p)return;
let cur=chSel.value;
let chans=Object.fromEntries(Object.entries(filteredChannelMap).filter(([,k])=>k.some(x=>filteredCategoryMap[p].includes(x))));
populate(chSel,chans,"Select a Channel",cur in chans?cur:null);
update();
};

chSel.onchange=()=>{
let c=chSel.value;
localStorage.setItem(STORAGE_KEYS.channel,c||"");
if(!c)return;
let cur=cSel.value;
let perfs=Object.fromEntries(Object.entries(filteredCategoryMap).filter(([,k])=>k.some(x=>filteredChannelMap[c].includes(x))));
populate(cSel,perfs,"Select a Performer",cur in perfs?cur:null);
update();
};

document.getElementById("playRandomCategoryBtn").onclick=()=>{
let p=cSel.value;
if(p)openVideo(rnd(filteredCategoryMap[p]));
};

document.getElementById("playRandomChannelBtn").onclick=()=>{
let c=chSel.value;
if(c)openVideo(rnd(filteredChannelMap[c]));
};

playBtn.onclick=()=>{
let p=cSel.value,c=chSel.value;
if(!p||!c)return;
let v=filteredCategoryMap[p].filter(k=>filteredChannelMap[c].includes(k));
if(v.length)openVideo(rnd(v));
};

document.getElementById("clearFilterP").onclick=()=>{
filteredCategoryMap={...fullCategoryMap};
localStorage.removeItem(STORAGE_KEYS.category);
populate(cSel,filteredCategoryMap,"Select a Performer")
};

document.getElementById("filterAMP").onclick=()=>{filteredCategoryMap=alphaFilter(fullCategoryMap,"AM");populate(cSel,filteredCategoryMap,"Select a Performer")};
document.getElementById("filterNZP").onclick=()=>{filteredCategoryMap=alphaFilter(fullCategoryMap,"NZ");populate(cSel,filteredCategoryMap,"Select a Performer")};

document.getElementById("clearFilterC").onclick=()=>{
filteredChannelMap={...fullChannelMap};
localStorage.removeItem(STORAGE_KEYS.channel);
populate(chSel,filteredChannelMap,"Select a Channel")
};

document.getElementById("filterAMC").onclick=()=>{filteredChannelMap=alphaFilter(fullChannelMap,"AM");populate(chSel,filteredChannelMap,"Select a Channel")};
document.getElementById("filterNZC").onclick=()=>{filteredChannelMap=alphaFilter(fullChannelMap,"NZ");populate(chSel,filteredChannelMap,"Select a Channel")};
}
</script></body></html>
